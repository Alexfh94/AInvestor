services:
  ainvestor:
    build: .
    ports:
      - "8000:8000"
    environment:
      TZ: Europe/Madrid
      APP_ENV: production
      AI_MODEL: composer-2.5
      AI_USE_MCP: "false"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
