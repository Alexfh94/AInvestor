# Risk configuration - versioned and auditable
version: "3.0"

fees:
  exchange: binance
  fallback_taker_rate: 0.001

stops:
  require_stop_loss: true
  require_take_profit: true
  max_stop_loss_pct: 5.0
  min_take_profit_pct: 1.0
  use_atr_suggestions: true

allocation:
  max_crypto_pct: 70.0
  max_stocks_pct: 40.0
  max_derivatives_pct: 20.0

modes:
  paper:
    enabled: true
  testnet:
    enabled: false
  live:
    enabled: false
    max_capital_eur: 100.0
    gradual_activation:
      crypto_spot: false
      crypto_perps: false
      stocks: false
    caps_per_class_eur:
      crypto: 50.0
      stocks: 50.0
      derivatives: 25.0
    kill_switch_global: true
    mifid_leverage_cap: 2

ibkr:
  enabled: false
  host: "127.0.0.1"
  port: 7497
  client_id: 1
  paper: true

profiles:
  conservative:
    initial_balance_usdt: 100.0
    position:
      max_position_pct: 20.0
      max_position_pct_high_conviction: 60.0
      high_conviction_threshold: 70
      max_open_positions: 4
      min_order_value_usdt: 5.0
    limits:
      max_daily_loss_pct: 3.0
      max_weekly_loss_pct: 8.0
      max_drawdown_pct: 15.0
      max_trades_per_day: 6
    ai_validation:
      conviction_divergence_threshold: 30
      min_conviction_on_divergence: 80
    whitelist:
      pairs:
        - BTC/USDT
        - ETH/USDT
        - SOL/USDT
        - BNB/USDT
        - XRP/USDT
        - ADA/USDT
        - DOGE/USDT
        - AVAX/USDT
        - LINK/USDT
        - DOT/USDT
    derivatives:
      enabled: true
      paper_only: true
      max_leverage: 1
      max_open_perps: 1
      funding_cost_warning_pct: 0.05
      isolated_margin: true
      mifid_retail_leverage_cap: 2
    stocks:
      enabled: false
    prompt_style: conservative

  aggressive:
    initial_balance_usdt: 100.0
    position:
      max_position_pct: 85.0
      max_position_pct_high_conviction: 100.0
      high_conviction_threshold: 45
      max_open_positions: 6
      min_order_value_usdt: 5.0
    limits:
      max_daily_loss_pct: 15.0
      max_weekly_loss_pct: 25.0
      max_drawdown_pct: 50.0
      max_trades_per_day: 25
    ai_validation:
      conviction_divergence_threshold: 50
      min_conviction_on_divergence: 55
    whitelist:
      pairs:
        - SOL/USDT
        - BNB/USDT
        - XRP/USDT
        - ADA/USDT
        - DOGE/USDT
        - AVAX/USDT
        - LINK/USDT
        - DOT/USDT
    derivatives:
      enabled: true
      paper_only: true
      max_leverage: 2
      max_open_perps: 4
      funding_cost_warning_pct: 0.12
      isolated_margin: true
      mifid_retail_leverage_cap: 2
    stocks:
      enabled: false
    prompt_style: aggressive
